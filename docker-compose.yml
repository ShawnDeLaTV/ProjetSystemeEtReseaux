networks:
  sso_network:
    driver: bridge
  libredesk:

services:
  # Le Reverse Proxy (Nginx Proxy Manager)
  # C'est lui qui gère le HTTPS et redirige vers les bons services
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'   # Interface de gestion (Admin)
      - '443:443'
    volumes:
      - ./infrastructure/nginx/data:/data
      - ./infrastructure/nginx/letsencrypt:/etc/letsencrypt
    networks:
      - sso_network

  # Authelia (Le serveur d'authentification)
  authelia:
    image: 'authelia/authelia:latest'
    container_name: authelia
    restart: always
    ports:
      - '9091:9091'
    volumes:
      - ./infrastructure/authelia:/config
      - ./secrets:/config/secrets
    networks:
      - sso_network
    environment:
      - TZ=America/Montreal
      - AUTHELIA_CONFIG_EXPERIMENTAL_FILTERS=expand-env 
      - AUTHELIA_SESSION_COOKIES_INSECURE=true
      - AUTHELIA_SERVER_DISABLE_HEALTHCHECK=true

      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY=${AUTHELIA_OIDC_PRIVATE_KEY}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_KEY}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD=${LLDAP_ADMIN_PASSWORD}
    depends_on:
      - lldap

  # LLDAP
  lldap:
    image: 'lldap/lldap:latest'
    container_name: lldap
    restart: always
    environment:
      - TZ=America/Montreal
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD}
      - LLDAP_LDAP_BASE_DN=dc=techsolutions,dc=com
      - LLDAP_ARGON2_PARAMS__MEMORY_COST=32768
      - LLDAP_ARGON2_PARAMS__PARALLELISM=1
    volumes:
      - ./infrastructure/lldap:/data
    ports:
      - "17170:17170" 
      - "3890:3890"
    networks:
      - sso_network

  #Gitlab
  gitlab :
    image : 'gitlab/gitlab-ce:latest'
    container_name : gitlab
    restart : always
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.mondomaine.com'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        gitlab_rails['omniauth_enabled'] = true
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
    ports :
      - "2222:22"
    volumes :
      - ./infrastructure/Gitlab/config:/etc/gitlab
      - ./infrastructure/Gitlab/logs:/var/log/gitlab
      - ./infrastructure/Gitlab/data:/var/opt/gitlab
    networks :
      - sso_network

  #Jenkins
  jenkins:
    image : 'jenkins/jenkins:lts'
    container_name: jenkins
    restart : always
    user : root
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - ./infrastructure/Jenkins/data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks :
      - sso_network

  # Nextcloud (Le service de stockage de fichiers)
  nextcloud:
    image: 'nextcloud:latest'
    container_name: nextcloud
    restart: always
    ports:
      - '8081:80'  # Port HTTP pour Nextcloud (redirigé par Nginx Proxy Manager)
    volumes:
      - ./infrastructure/nextcloud/data:/var/www/html # Fichiers de configuration et utilisateurs
      - ./infrastructure/nextcloud/before-starting:/docker-entrypoint-hooks.d/before-starting # Hook pour initialiser Nextcloud
    environment:
      - MYSQL_DATABASE=nextcloud  # Nom de la base de données
      - MYSQL_USER=nextcloud_user      # Nom d'utilisateur de la base de données
      - MYSQL_PASSWORD=${NEXTCLOUD_MYSQL_USER_PASSWORD}   # Mot de passe de l'utilisateur
      - MYSQL_HOST=nextcloud_db   # Nom du service de la base de données dans Docker Compose
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}  # Nom d'utilisateur de l'administrateur Nextcloud
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}  # Mot de passe de l'administrateur Nextcloud
      - PHP_UPLOAD_LIMIT=10G      # limitations ressources pour Nextcloud
      - PHP_MEMORY_LIMIT=512M
    networks:
      - sso_network
    depends_on:
      - nextcloud_db
      - nginx-proxy

  nextcloud_db:
    image: 'mariadb:latest'
    container_name: nextcloud_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_MYSQL_ROOT_PASSWORD} # Mot de passe du root
      - MYSQL_DATABASE=nextcloud  # Nom de la base de données
      - MYSQL_USER=nextcloud_user      # Nom d'utilisateur de la base de données
      - MYSQL_PASSWORD=${NEXTCLOUD_MYSQL_USER_PASSWORD}   # Mot de passe de l'utilisateur
    volumes:
      - ./infrastructure/nextcloud/db:/var/lib/mysql  # Données persistantes de la base de données
    networks:
      - sso_network

  # Rocket.Chat (Le service de messagerie instantanée)
  rocketchat:
    image: 'rocketchat/rocket.chat:latest'
    container_name: rocketchat
    restart: always
    ports:
      - '3000:3000' # Port HTTP pour Rocket.Chat
    environment:
      - MONGO_URL=mongodb://rocketchat_db:27017/rocketchat  # URL de connexion à la base de données
      - ROOT_URL=http://localhost:3000             # URL de base pour Rocket.Chat, utilisée pour les liens et redirections
      - PORT=3000
    volumes:
      - ./infrastructure/rocketchat/uploads:/app/uploads    # Données persistantes pour les fichiers téléchargés dans Rocket.Chat
    networks:
      - sso_network
    depends_on:
      - rocketchat_db
      - nginx-proxy

  rocketchat_db:
    image: 'mongo:latest'
    container_name: rocketchat_db
    restart: always
    volumes:
      - ./infrastructure/rocketchat/db:/data/db # Données persistantes de la base de données
    networks:
      - sso_network

  # --- Docker compose Libredesk ---

  # Libredesk app
  app:
    image: libredesk/libredesk:latest
    container_name: libredesk_app
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # If the password is set during first docker-compose up, the system user password will be set to this value.
      # You can always set system user password later by running `docker exec -it libredesk_app ./libredesk --set-system-user-password`.
      LIBREDESK_SYSTEM_USER_PASSWORD: ${LIBREDESK_SYSTEM_USER_PASSWORD}
    networks:
      - libredesk
      - sso_network
    depends_on:
      - db
      - redis
    volumes:
      - ./infrastructure/libredesk/uploads:/libredesk/uploads:rw 
      - ./infrastructure/libredesk/config.toml:/libredesk/config.toml
    command: [sh, -c, "./libredesk --install --idempotent-install --yes --config /libredesk/config.toml && ./libredesk --upgrade --yes --config /libredesk/config.toml && ./libredesk --config /libredesk/config.toml"]
    
  # PostgreSQL database
  db:
    image: postgres:17-alpine
    container_name: libredesk_db
    restart: unless-stopped
    networks:
      - libredesk
    ports:
      # Only bind on the local interface. To connect to Postgres externally, change this to 0.0.0.0
      - "127.0.0.1:5432:5432"
    environment:
      # Set these environment variables to configure the database, defaults to libredesk.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - /infrastructure/libredesk/postgres-data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: libredesk_redis
    restart: unless-stopped
    ports:
      # Only bind on the local interface.
      - "127.0.0.1:6379:6379"
    networks:
      - libredesk
    volumes:
      - /infrastructure/libredesk/redis-data:/data

  # --- Fin docker compose Libredesk ---